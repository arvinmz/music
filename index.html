    <!DOCTYPE html>
    <html lang="fa" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>پلی‌لیست من 🎵</title>
        <style>
            body {
                font-family: 'Arial', sans-serif;
                background-color: #f0f2f5;
                color: #333;
                text-align: center;
                margin: 0;
                padding: 20px;
            }
            .container {
                max-width: 600px;
                margin: 40px auto;
                background-color: #fff;
                padding: 30px;
                border-radius: 10px;
                box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            }
            h1 {
                color: #1877f2; /* رنگ آبی شبیه فیسبوک */
                margin-bottom: 25px;
            }
            audio {
                width: 100%;
                margin-top: 15px;
                margin-bottom: 10px;
                background-color: #e4e6eb;
                border-radius: 5px;
            }
            p {
                font-size: 0.9em;
                color: #65676b;
                margin-bottom: 20px;
            }
            img.album-art {
                width: 80px;
                height: 80px;
                border-radius: 5px;
                margin-right: 15px;
                vertical-align: middle;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>پلی‌لیست آهنگ‌های مورد علاقه من</h1>

            <!-- آهنگ اول -->
            <div>
                <img src="https://via.placeholder.com/80" alt="کاور آهنگ" class="album-art"> <!-- یه عکسplaceholder بذار تا بعد عوض کنی -->
                <audio controls>
                    <source src="لینک مستقیم آهنگ اول MP3 شما" type="audio/mpeg">
                    مرورگر شما از پخش کننده صوتی پشتیبانی نمی‌کند.
                </audio>
                <p>نام آهنگ اول - خواننده</p>
            </div>

            <!-- آهنگ دوم -->
            <div>
                <img src="https://via.placeholder.com/80" alt="کاور آهنگ" class="album-art">
                <audio controls>
                    <source src="لینک مستقیم آهنگ دوم MP3 شما" type="audio/mpeg">
                    مرورگر شما از پخش کننده صوتی پشتیبانی نمی‌کند.
                </audio>
                <p>نام آهنگ دوم - خواننده</p>
            </div>

            <!-- آهنگ‌های بیشتر را اینجا اضافه کنید -->
            <div>
                <img src="https://via.placeholder.com/80" alt="کاور آهنگ" class="album-art">
                <audio controls>
                    <source src="لینک مستقیم آهنگ سوم MP3 شما" type="audio/mpeg">
                    مرورگر شما از پخش کننده صوتی پشتیبانی نمی‌کند.
                </audio>
                <p>نام آهنگ سوم - خواننده</p>
            </div>

        </div>
    </body>
    </html>
